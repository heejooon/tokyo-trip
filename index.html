    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
        
        /* 다크모드 전역 배경색 전환 부드럽게 */
        body, #itinerary-panel, header { transition: background-color 0.3s, color 0.3s; }
        
        .main-container { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        @media (min-width: 768px) { .main-container { flex-direction: row; } }
        
        /* 모바일 지도 사이즈 (이전 상태 유지) */
        #map { flex: none; height: 28vh; min-height: 220px; z-index: 1; border-bottom: 1px solid #e2e8f0; }
        @media (min-width: 768px) { #map { flex: 1; height: auto; border-bottom: none; border-right: 1px solid #e2e8f0; } }

        /* 다크모드일 때 지도 색상 반전 (눈 보호 및 트렌디한 느낌) */
        .dark #map { filter: brightness(0.8) invert(1) contrast(0.9) hue-rotate(200deg); border-color: #1e293b; }

        #itinerary-panel { flex: 1; overflow-y: auto; background-color: #ffffff; z-index: 10; scroll-behavior: smooth; }
        .dark #itinerary-panel { background-color: #0f172a; }
        @media (min-width: 768px) { #itinerary-panel { max-width: 480px; flex: none; width: 480px; } }

        /* 가로 스크롤바 숨기기 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 콤팩트 팝업 & 다크모드 대응 */
        .custom-popup .leaflet-popup-content-wrapper { background: rgba(255, 255, 255, 0.98); color: #1e293b; border-radius: 12px; backdrop-filter: blur(8px); border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); padding: 0; }
        .custom-popup .leaflet-popup-tip { background: rgba(255, 255, 255, 0.98); }
        .custom-popup .leaflet-popup-content { margin: 8px 12px; }
        
        .dark .custom-popup .leaflet-popup-content-wrapper { background: rgba(30, 41, 59, 0.95); color: #f8fafc; border-color: #334155; }
        .dark .custom-popup .leaflet-popup-tip { background: rgba(30, 41, 59, 0.95); }

        /* 마커 라벨 스타일 */
        .marker-label { background-color: white; border: 3px solid; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
        .dark .marker-label { background-color: #1e293b; }

        .highlight-item { animation: highlight-fade 2s ease-out; }
        @keyframes highlight-fade { 0% { background-color: rgba(59, 130, 246, 0.1); border-radius: 0.5rem; } 100% { background-color: transparent; border-radius: 0.5rem; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { border: 2px solid rgba(139, 92, 246, 0.2); border-left-color: #8b5cf6; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 4px; }

    <script>
        // --- D-Day 및 타이틀 자동 계산 ---
        function updateDynamicTitle() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // 여행 첫날 설정 (2026년 3월 14일)
            const tripStart = new Date('2026-03-14T00:00:00');
            tripStart.setHours(0, 0, 0, 0);

            const diffTime = today.getTime() - tripStart.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let titleBadge = "";
            if (diffDays < 0) {
                titleBadge = `D${diffDays}`; // diffDays가 이미 음수이므로 D-5 형태로 나옴
            } else if (diffDays === 0) {
                titleBadge = "1일차";
            } else if (diffDays === 1) {
                titleBadge = "2일차";
            } else if (diffDays === 2) {
                titleBadge = "3일차";
            } else if (diffDays === 3) {
                titleBadge = "마지막날";
            } else {
                titleBadge = "여행 종료";
            }
            
            document.getElementById('dynamic-title-text').innerText = `도쿄 여행 ${titleBadge}`;
        }

        // --- 다크모드 토글 로직 ---
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');

            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        // --- Gemini API Configuration ---
        const apiKey = "AIzaSyBaymfWG8rcnLG-v1tJnVRQHV2fso6BMP4"; 
        const modelName = apiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
        
        async function fetchGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "너는 도쿄 로컬 가이드야. 날씨 정보는 검색을 활용해 정확히 알려주고, 무조건 요청한 양식에 맞춰서 아주 짧고 간결하게 대답해. 마크다운 기호(* 등)는 절대 사용하지 마." }] },
                tools: [{ "google_search": {} }]
            };
            
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const result = await response.json();
                    if (!response.ok) throw new Error(result.error?.message || `HTTP Error: ${response.status}`);
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "결과를 불러오지 못했습니다.";
                } catch (error) {
                    if (i === 4) return `<span class="text-red-500">🚨 에러: ${error.message}</span><br><span class="text-xs text-slate-400">1분 호출 제한(무료) 또는 API 키 오류입니다. 천천히 다시 눌러주세요.</span>`;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

                { name: 'SKWAT / twelvebooks', lat: 35.6610, lng: 139.7160, icon: '📖', time: '16:00 - 18:00', text: '감각적인 인테리어의 아트북 서점.', link: 'https://www.google.com/maps/dir/?api=1&origin=twelvebooks+Aoyama&destination=TOTOPA+Meiji+Park&travelmode=walking', linkText: '🚶 가이엔마에(메이지 공원) 방향 도보 15분' },
                { name: 'TOTOPA 사우나', lat: 35.6780, lng: 139.7130, icon: '♨️', time: '18:30 - 19:30', text: '트렌디한 사우나에서 다리 피로 회복.', link: 'https://www.google.com/maps/dir/?api=1&origin=TOTOPA+Meiji+Park&destination=Tokyo+Tower&travelmode=transit', linkText: '🚇 오에도선 아카바네바시역 (약 15분)' },
                { name: '도쿄 타워 스냅', lat: 35.6586, lng: 139.7454, icon: '🗼', time: '20:30 - 21:30', text: '아카바네바시역 주변 도로에서 타워 배경 야경 스냅.', link: 'https://www.google.com/maps/dir/?api=1&origin=Tokyo+Tower&destination=Popeye+Ryogoku&travelmode=transit', linkText: '🚇 오에도선 료고쿠역 (약 30분)' },
                { name: '뽀빠이 펍', lat: 35.6936, lng: 139.7930, icon: '🍺', time: '22:00 - 23:30', text: '70여 종 크래프트 맥주 전설적인 펍.', link: 'https://www.google.com/maps/dir/?api=1&origin=Popeye+Ryogoku&destination=Hotel+Villa+Fontaine+Tokyo-Kayabacho&travelmode=transit', linkText: '🚕 택시 이용 시 약 1500엔 / 🚇 대중교통 복귀' }
            ]},
            day4: { color: '#f59e0b', desc: '아사쿠사 -> 우에노 -> 나리타 출국', date: '3월 17일', locations: [
                { name: '체크아웃', lat: 35.6797, lng: 139.7797, icon: '🧳', time: '10:00', text: '체크아웃 및 호텔 짐 보관', link: 'https://www.google.com/maps/dir/?api=1&origin=Hotel+Villa+Fontaine+Tokyo-Kayabacho&destination=Senso-ji&travelmode=transit', linkText: '🚇 아사쿠사선 아사쿠사역 (약 15분)' },
                { name: '아사쿠사 센소지', lat: 35.7148, lng: 139.7967, icon: '🏮', time: '10:30 - 12:30', text: '북적이는 옛 거리(나카미세도리) 스냅 및 점심.', link: 'https://www.google.com/maps/dir/?api=1&origin=Senso-ji&destination=Ameyoko+Shopping+Street&travelmode=transit', linkText: '🚇 긴자선 우에노역 (약 10분)' },
                { name: '우에노 아메요코초', lat: 35.7099, lng: 139.7745, icon: '🛒', time: '13:00 - 15:30', text: '재래시장 바이브 스냅 및 드럭스토어 쇼핑.', link: 'https://www.google.com/maps/dir/?api=1&origin=Ameyoko+Shopping+Street&destination=Keisei-Ueno+Station&travelmode=walking', linkText: '🚶 게이세이 우에노역으로 짐 픽업 후 이동' },
                { name: '나리타 공항으로', lat: 35.7110, lng: 139.7730, icon: '🚆', time: '16:00', text: '19:00 비행기 탑승을 위한 여유 있는 출국길.', link: 'https://www.google.com/maps/dir/?api=1&origin=Keisei-Ueno+Station&destination=Narita+Airport&travelmode=transit', linkText: '🚇 스카이라이너 탑승 (약 45분)' }
            ]}
        };

        let currentLayerGroup = L.featureGroup().addTo(map);
        let currentMapMarkers = [];

        function createCustomIcon(number, color) {
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="marker-label" style="border-color: ${color}; color: ${color};">${number}</div>`,
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
        }

        // 특정 일자 루트 그리기
        async function drawRoute(dayKey) {
            currentLayerGroup.clearLayers(); 
            currentMapMarkers = [];
            const dayData = itineraryData[dayKey];
            const coordinates = dayData.locations.map(loc => [loc.lat, loc.lng]);

            L.polyline(coordinates, { color: dayData.color, weight: 6, opacity: 0.6, dashArray: '8, 12', lineJoin: 'round' }).addTo(currentLayerGroup);

            let textHtml = `<h2 class="text-xl font-black text-slate-800 dark:text-slate-100 mb-6 border-l-4 pl-3" style="border-color: ${dayData.color};">Day ${dayKey.replace('day', '')}: ${dayData.desc.split('->').join('·')}</h2><div class="space-y-7 ml-2 pb-10">`;

            dayData.locations.forEach((loc, index) => {
                const marker = L.marker([loc.lat, loc.lng], { icon: createCustomIcon(index + 1, dayData.color) }).addTo(currentLayerGroup);
                currentMapMarkers.push(marker);

                const gmapSearchUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.name + ' 도쿄')}`;

                // 팝업 레이아웃: 버튼 두 개를 가로(좌/우)로 꽉 차게 배치하여 세로 길이 축소
                const popupContent = `
                    <div class="text-center min-w-[170px] max-w-[200px]">
                        <div class="text-2xl mb-1">${loc.icon}</div>
                        <div class="font-bold text-[13px] mb-2 text-slate-800 dark:text-slate-100 leading-tight">${index + 1}. ${loc.name}</div>
                        
                        <div class="flex gap-1.5 w-full mt-1">
                            <button onclick="getPhotoTip('${loc.name}', ${index})" id="btn-tip-${index}" class="flex-1 bg-gradient-to-r from-purple-500 to-indigo-500 text-white py-1.5 rounded-lg text-[10px] font-bold active:scale-95 shadow-sm whitespace-nowrap">✨ AI 팁</button>
                            <a href="${gmapSearchUrl}" target="_blank" class="flex-1 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 py-1.5 rounded-lg text-[10px] font-bold border border-slate-300 dark:border-slate-600 shadow-sm flex items-center justify-center whitespace-nowrap">🗺️ 구글맵</a>
                        </div>
                        
                        <div id="ai-tip-box-${index}" class="hidden mt-2 text-left text-[11px] bg-indigo-50 dark:bg-slate-800/80 p-2 rounded-lg border border-indigo-100 dark:border-slate-600 text-indigo-900 dark:text-indigo-200 leading-snug font-medium"></div>
                    </div>
                `;
                marker.bindPopup(popupContent, { className: 'custom-popup', autoPanPadding: [10, 10] });

                marker.on('click', () => {
                    const el = document.getElementById(`route-item-${index}`);
                    if(el) {
                        const panel = document.getElementById('itinerary-panel');
                        panel.scrollTo({ top: el.offsetTop - 30, behavior: 'smooth' });
                        el.classList.add('highlight-item');
                        setTimeout(() => el.classList.remove('highlight-item'), 2000);
                    }
                });

                textHtml += `
                    <div id="route-item-${index}" class="relative pl-8 border-l-2 border-slate-200 dark:border-slate-700 py-1 transition-colors duration-300">
                        <div onclick="focusMapMarker(${index})" class="absolute w-7 h-7 bg-white dark:bg-slate-800 rounded-full border-[3px] flex items-center justify-center text-[13px] font-black -left-[15px] top-0 shadow-sm cursor-pointer hover:scale-110 transition-transform" style="border-color: ${dayData.color}; color: ${dayData.color};">${index + 1}</div>
                        <h4 class="text-slate-800 dark:text-slate-100 font-bold text-base flex items-center gap-2">${loc.time} | ${loc.name}</h4>
                        <p class="text-[13px] text-slate-500 dark:text-slate-400 font-medium mt-1 leading-snug">${loc.text}</p>
                        ${loc.link ? `
                        <a href="${loc.link}" target="_blank" class="inline-flex items-center gap-1.5 text-[11px] text-indigo-600 dark:text-indigo-400 font-bold mt-2 bg-indigo-50/80 dark:bg-slate-800/80 px-2.5 py-1.5 rounded-lg border border-indigo-100 dark:border-slate-700 hover:bg-indigo-100 dark:hover:bg-slate-700 transition-colors cursor-pointer shadow-sm">
                            ${loc.linkText} <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>` : ''}
                    </div>
                `;
            });
            textHtml += `</div>`;

            map.fitBounds(currentLayerGroup.getBounds(), { padding: [40, 40] });
            document.getElementById('itinerary-content').innerHTML = textHtml;
            document.getElementById('itinerary-panel').scrollTop = 0;
            showDailyPanel(dayData.desc, dayData.date);
        }

        window.focusMapMarker = function(index) {
            if(currentMapMarkers[index]) {
                const marker = currentMapMarkers[index];
                map.setView(marker.getLatLng(), 15, { animate: true, duration: 0.5 });
                setTimeout(() => marker.openPopup(), 400);
                if(window.innerWidth < 768) { window.scrollTo({ top: 0, behavior: 'smooth' }); }
            }
        };

        function showAll() {
            document.getElementById('ai-daily-box').classList.add('hidden');
            document.getElementById('itinerary-content').innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-400 dark:text-slate-500 mt-20"><div class="text-5xl mb-4">🗺️</div><p class="font-medium">전체 루트가 지도에 표시되었습니다.</p></div>`;
            currentLayerGroup.clearLayers();
            let allCoordinates = [];

            Object.keys(itineraryData).forEach(dayKey => {
                const dayData = itineraryData[dayKey];
                const coordinates = dayData.locations.map(loc => [loc.lat, loc.lng]);
                L.polyline(coordinates, { color: dayData.color, weight: 4, opacity: 0.5 }).addTo(currentLayerGroup);
                dayData.locations.forEach((loc) => {
                    L.circleMarker([loc.lat, loc.lng], { radius: 6, fillColor: dayData.color, color: '#fff', weight: 2, fillOpacity: 1 }).bindTooltip(`${loc.name}`).addTo(currentLayerGroup);
                });
                allCoordinates = allCoordinates.concat(coordinates);
            });
            map.fitBounds(L.latLngBounds(allCoordinates), { padding: [20, 20] });
        }

        async function showDailyPanel(routeDesc, date) {
            const aiBox = document.getElementById('ai-daily-box');
            const contentBox = document.getElementById('ai-daily-content');
            aiBox.classList.remove('hidden');
            contentBox.innerHTML = `<div class="flex items-center text-purple-500 py-1"><span class="spinner"></span> 트렌드 & 날씨 분석 중...</div>`;
            
            const prompt = `2026년 ${date} 도쿄 날씨를 검색해줘. 코스는 '${routeDesc}'야. 다른 설명은 다 빼고 반드시 아래 양식에 맞춰서만 대답해.

양식:
🌡️ 최고°C / 최저°C | 오전날씨이모지 ➡️ 오후날씨이모지 | ☔ 강수확률%
📸 테마: (이 날씨와 코스에 어울리는 스트릿 스냅 테마를 딱 1~2문장으로 힙하고 짧게 추천)`;
            
            const responseText = await fetchGemini(prompt);
            contentBox.innerHTML = responseText.replace(/\n/g, '<br>');
        }

        window.getPhotoTip = async function(locationName, index) {
            const btn = document.getElementById(`btn-tip-${index}`);
            const tipBox = document.getElementById(`ai-tip-box-${index}`);
            
            if (locationName.includes('호텔') || locationName.includes('나리타')) {
                tipBox.innerHTML = "이곳은 휴식을 위한 장소입니다! 카메라를 잠시 내려놓고 다음 스팟을 준비하세요 🍵";
                tipBox.classList.remove('hidden'); btn.style.display = 'none'; return;
            }

            btn.innerHTML = `<span class="spinner"></span> 분석 중...`; btn.disabled = true;
            const prompt = `도쿄의 '${locationName}'에서 스트릿 스냅 사진을 찍으려고 해. 이곳만의 특별한 사진 구도나 배경, 촬영 팁을 딱 2문장으로 아주 짧고 힙하게 알려줘.`;
            const responseText = await fetchGemini(prompt);
            tipBox.innerHTML = `<strong>💡 팁:</strong> ${responseText}`;
            tipBox.classList.remove('hidden'); btn.style.display = 'none';
        }

        // 페이지 로드 시 타이틀 자동 계산
        window.onload = () => {
            updateDynamicTitle();
        };
    </script>
</body>

</html>
